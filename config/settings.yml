# Jtech — combined plugin settings.
#
# Each top-level key (jtech, jtech_dislike, jtech_smtp, jtech_mini_mod,
# jtech_mod, jtech_dumbcourse) becomes its own admin-UI settings tab.
# Within each tab, settings are ordered: master enable first, then feature
# toggles, then config options for those features. trust_level_4 is the
# Discourse core category.

# ───────────────────────────────────────────────────────────────────────────
# Jtech (master)
# ───────────────────────────────────────────────────────────────────────────
jtech:
  jtech_enabled:
    default: true
    client: true

# ───────────────────────────────────────────────────────────────────────────
# Jtech — Dislike (phantom reactions in restricted categories)
# ───────────────────────────────────────────────────────────────────────────
jtech_dislike:
  # Master switch.
  discourse_no_likes_enabled:
    default: true
    client: false

  # Scope — which categories trigger phantom-reaction behavior.
  no_reactions_category_ids:
    default: ''
    client: false
    type: category_list

  # Audience — who can react inside restricted categories.
  dislike_hide_like_button:
    default: false
    client: false
  dislike_allowed_like_groups:
    default: ''
    client: false
    type: group_list
    allow_any: true

  # What "phantom" actually means — pick any combination.
  dislike_show_in_history:
    default: false
    client: false
  dislike_count_in_leaderboard:
    default: false
    client: false
  dislike_record_audit_trail:
    default: true
    client: false

  # Maintenance — toggle on to retroactively clear; auto-resets after run.
  purge_phantom_likes_now:
    default: false
    client: false
    type: bool

# ───────────────────────────────────────────────────────────────────────────
# Jtech — Alternate SMTP
# ───────────────────────────────────────────────────────────────────────────
jtech_smtp:
  # Master switch.
  discourse_another_email_enabled:
    default: false
    client: false

  # SMTP credentials & endpoint.
  discourse_another_email_smtp_address:
    default: 172.17.0.1
    client: false
  discourse_another_email_smtp_port:
    default: 587
    client: false
    min: 0
    max: 65537
  discourse_another_email_smtp_authentication_mode:
    default: plain
    client: false
  discourse_another_email_smtp_username:
    default: username@example.com
    client: false
  discourse_another_email_smtp_password:
    default: password
    client: false
    secret: true

  # From-address rewriting (optional).
  discourse_another_email_force_from_domain:
    default: ''
    client: false
  discourse_another_email_force_smtp_username_to_sender:
    default: false
    client: false

# ───────────────────────────────────────────────────────────────────────────
# Jtech — Mini-mod (category group moderators get category-create rights)
# ───────────────────────────────────────────────────────────────────────────
jtech_mini_mod:
  # Master switch.
  mini_mod_enabled:
    default: false
    client: true

  # What category group moderators are allowed to do.
  mini_mod_manage_all_categories:
    default: false
    client: true
  mini_mod_manage_tags:
    default: false
    client: true
  mini_mod_can_post_in_closed_topics:
    default: false
    client: false
  mini_mod_can_reopen_topics:
    default: false
    client: false

# ───────────────────────────────────────────────────────────────────────────
# Trust Level 4 (Discourse core category — kept here because mini-mod adds
# settings to it.)
# ───────────────────────────────────────────────────────────────────────────
trust_level_4:
  tl4_can_post_in_closed_topics:
    default: false
    client: false
  tl4_can_reopen_topics:
    default: false
    client: false

# ───────────────────────────────────────────────────────────────────────────
# Jtech — Mod (moderator topic tools: pre-checks, whispers, footers, etc.)
# ───────────────────────────────────────────────────────────────────────────
jtech_mod:
  # Master switch.
  mod_categories_enabled:
    default: false
    client: true

  # Per-feature toggles.
  precheck_new_topic_enabled:
    default: true
    client: true
  topic_footer_message_enabled:
    default: true
    client: true
  topic_reply_prompt_enabled:
    default: true
    client: true
  mod_whisper_enabled:
    default: true
    client: true

  mod_notify_staff_on_post_actions:
    default: true
    client: false
  mod_notify_staff_on_user_notes:
    default: true
    client: false
  mod_notify_staff_on_flag_notes:
    default: true
    client: false

# ───────────────────────────────────────────────────────────────────────────
# Jtech — Smart search (synonym query expansion)
# ───────────────────────────────────────────────────────────────────────────
jtech_smart_search:
  smart_search_enabled:
    default: false
    client: false
  smart_search_minimum_results:
    default: 5
    client: false
    min: 0
    max: 50
  smart_search_variant_limit:
    default: 2
    client: false
    min: 1
    max: 5

# ───────────────────────────────────────────────────────────────────────────
# Jtech — Dumbcourse (lightweight SPA at /dumb with push notifications)
# ───────────────────────────────────────────────────────────────────────────
jtech_dumbcourse:
  # Master switch.
  dumbcourse_enabled:
    default: true
    client: true

  # Where the SPA mounts and how it looks by default.
  dumbcourse_base_path:
    default: dumb
    client: true
  dumbcourse_default_theme:
    default: dark
    client: true
    type: enum
    choices:
    - dark
    - light
  dumbcourse_default_view:
    default: latest
    client: true
    type: enum
    choices:
    - latest
    - new
    - top
    - unseen
    - hot
    - my
    - categories

  # Display options.
  dumbcourse_sidebar_link_enabled:
    default: true
    client: true
  dumbcourse_show_category_names:
    default: true
    client: true
  dumbcourse_topic_posters_visibility:
    default: all
    client: true
    type: enum
    choices:
    - all
    - desktop
    - mobile
    - none
  dumbcourse_online_glow_enabled:
    default: true
    client: true

  # Topic-list pagination.
  dumbcourse_pagination_enabled:
    default: false
    client: true
  dumbcourse_topics_per_page:
    default: 30
    min: 10
    max: 100
    client: true

  # Push notifications (web push + ntfy SSE).
  dumbcourse_push_enabled:
    default: false
    client: false

  # LanguageTool integration (composer Refine button).
  dumbcourse_languagetool_enabled:
    default: false
    client: false
  dumbcourse_languagetool_mode:
    default: self_hosted
    client: false
    type: enum
    enum: DumbcourseLanguagetoolModeSiteSetting
  dumbcourse_languagetool_url:
    default: ''
    client: false
  dumbcourse_languagetool_secret:
    default: ''
    client: false
  dumbcourse_languagetool_api_url:
    default: https://api.languagetool.org/v2/check
    client: false
  dumbcourse_languagetool_api_username:
    default: ''
    client: false
  dumbcourse_languagetool_api_key:
    default: ''
    client: false
