# Built-in synonym dictionary for the smart_search sub-plugin.
#
# Each row is a SYMMETRIC group — every word in the group is considered a
# synonym of every other word in the group. The first word per row is
# also the canonical "lookup head", but the smart_search lookup is order-
# independent at runtime.
#
# Editing notes:
#   * All entries MUST be lowercase ASCII. The expander downcases at
#     lookup time, so adding "Kid" here would be dead weight.
#   * Avoid groups longer than ~6 words — every extra word increases the
#     odds of an irrelevant match without proportionally improving recall.
#   * Don't group words that share spelling but not meaning ("bark" the
#     tree vs the dog) — that introduces false positives the user can't
#     turn off without disabling the whole plugin.
#   * The ABA-domain block is the highest-value section for this forum;
#     general English groups are kept short to avoid noise.

# --- General English ---
- [kid, child, youth, minor, juvenile]
- [parent, caregiver, guardian, mom, dad]
- [listen, comply, obey, follow]
- [behavior, behaviour, conduct, action]
- [tantrum, meltdown, outburst, fit]
- [angry, mad, upset, frustrated]
- [happy, glad, pleased, content]
- [problem, issue, concern, trouble]
- [help, assist, support, aid]
- [teach, train, instruct, educate]
- [reward, reinforcer, incentive]
- [punishment, consequence, penalty]
- [strategy, approach, method, technique]
- [goal, objective, target, aim]
- [progress, improvement, gain, growth]
- [school, classroom, academy]
- [home, house, household, residence]

