# Smart-search tech-jargon overlay.
#
# Only entries WordNet DOESN'T know go here — abbreviations, brand names,
# protocol initialisms, and other shop-floor vocabulary. General English
# (bug ↔ defect ↔ glitch, fast ↔ quick ↔ rapid, …) is handled by the
# WordNet backend automatically; adding those words here would only
# create maintenance debt without improving recall.
#
# Editing notes:
#   * All entries MUST be lowercase ASCII. Lookup downcases at query
#     time.
#   * Symmetric: every word in a row is a synonym of every other word
#     in that row.
#   * Avoid groups longer than ~6 words — extras dilute precision.
#   * Don't group words that share spelling but not meaning.
#   * Verify with `DiscourseSmartSearch::Synonyms.for("your-word")` in
#     a Rails console after restart.

